<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			:root {
				--primary: #017ae0;
				--success: #00bc89;
				--error: #ff5241;
				--bg: #f5f5f5;
				--radius: 12px;
			}

			.profile-card {
				max-width: 400px;
				padding: 24px;
				border-radius: var(--radius);
				border-top: 4px solid var(--primary);
				background: white;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
				transition:
					transform 0.2s,
					box-shadow 0.2s;
				position: relative;
			}

			.profile-card:hover {
				transform: translateY(-4px);
				box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
			}

			.profile-card::after {
				content: '';
				position: absolute;
				bottom: 0;
				left: 0;
				right: 0;
				height: 4px;
				border-radius: 0 0 var(--radius) var(--radius);
				background: linear-gradient(
					to right,
					var(--primary),
					var(--success)
				);
			}

			.avatar {
				width: 60px;
				height: 60px;
				border-radius: 50%;
				background: var(--primary);
				color: white;
				display: flex;
				align-items: center;
				justify-content: center;
				font-weight: bold;
				font-size: 18px;
			}

			.subjects {
				display: flex;
				gap: 12px;
			}
			.grade.high {
				color: var(--success);
				font-weight: bold;
			}
			.grade.low {
				color: var(--error);
				font-weight: bold;
			}

			@media (max-width: 600px) {
				.profile-card {
					width: 100%;
				}
				.subjects {
					flex-direction: column;
				}
			}
		</style>
	</head>
	<body>
		<div class="profile-card">
			<div class="avatar">ИП</div>
			<h2 class="name">Иван Петров</h2>
			<span class="class-label">Клас 11А</span>
			<p class="average">
				Среден успех: <span class="grade high">5.25</span>
			</p>

			<div class="subjects">
				<div class="subject">
					<span class="subject-name">Математика</span>
					<span class="grade high">5.50</span>
				</div>
				<div class="subject">
					<span class="subject-name">Физика</span>
					<span class="grade low">3.25</span>
				</div>
				<div class="subject">
					<span class="subject-name">Информатика</span>
					<span class="grade high">6.00</span>
				</div>
			</div>
		</div>
	</body>
</html>
